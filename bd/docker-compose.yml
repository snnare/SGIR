services:
  db:
    image: postgres:16-alpine
    container_name: sgir_postgres
    restart: always
    environment:
      - POSTGRES_USER=sgir
      - POSTGRES_PASSWORD=sgir
      - POSTGRES_DB=sgir_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./documentacion/01_modelo_fisico.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./documentacion/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql 

  mysql5:
    image: mysql:5.7
    container_name: sgir_mysql5
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=sgir
      - MYSQL_DATABASE=sgir_db_5
      - MYSQL_USER=sgir
      - MYSQL_PASSWORD=sgir
    ports:
      - "3305:3306"
    volumes:
      - ./monitoreo/mysql5/01_usuario_mysql5.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./monitoreo/mysql5/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql

  mysql8:
    image: mysql:8.0
    container_name: sgir_mysql8
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=sgir
      - MYSQL_DATABASE=sgir_db_8
      - MYSQL_USER=sgir
      - MYSQL_PASSWORD=sgir
    ports:
      - "3308:3306"
    volumes:
      - ./monitoreo/mysql8/01_usuario_mysql8.sql:/docker-entrypoint-initdb.d/01_usuario.sql
      - ./monitoreo/mysql8/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql

